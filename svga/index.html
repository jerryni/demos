<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SVGA 预览</title>
  <style>
    :root {
      color-scheme: light;
      --bg: #f4f1ea;
      --panel: rgba(255, 252, 245, 0.88);
      --text: #1f2937;
      --muted: #6b7280;
      --accent: #c2410c;
      --accent-dark: #9a3412;
      --border: rgba(31, 41, 55, 0.12);
      --shadow: 0 24px 60px rgba(31, 41, 55, 0.12);
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: "Segoe UI", "PingFang SC", "Hiragino Sans GB", sans-serif;
      color: var(--text);
      background:
        radial-gradient(circle at top, rgba(194, 65, 12, 0.16), transparent 32%),
        linear-gradient(180deg, #fcfaf6 0%, var(--bg) 100%);
      display: grid;
      place-items: center;
      padding: 24px;
    }

    .app {
      width: min(920px, 100%);
      background: var(--panel);
      backdrop-filter: blur(18px);
      border: 1px solid var(--border);
      border-radius: 28px;
      box-shadow: var(--shadow);
      overflow: hidden;
    }

    .header {
      padding: 28px 28px 20px;
      border-bottom: 1px solid var(--border);
    }

    .title {
      margin: 0 0 8px;
      font-size: clamp(28px, 4vw, 42px);
      line-height: 1.05;
    }

    .desc {
      margin: 0;
      color: var(--muted);
      font-size: 15px;
    }

    .content {
      display: grid;
      grid-template-columns: 280px 1fr;
      gap: 0;
    }

    .sidebar {
      padding: 24px 20px 24px 28px;
      border-right: 1px solid var(--border);
      background: rgba(255, 255, 255, 0.35);
    }

    .stage-wrap {
      padding: 28px;
    }

    .label {
      display: block;
      margin-bottom: 8px;
      font-size: 13px;
      font-weight: 600;
      letter-spacing: 0.02em;
    }

    select,
    button {
      width: 100%;
      border: 1px solid var(--border);
      border-radius: 14px;
      font: inherit;
    }

    select {
      padding: 12px 14px;
      margin-bottom: 16px;
      background: white;
      color: var(--text);
    }

    .actions {
      display: grid;
      gap: 10px;
    }

    button {
      padding: 12px 14px;
      cursor: pointer;
      background: white;
      color: var(--text);
      transition: transform 160ms ease, border-color 160ms ease, background 160ms ease;
    }

    button:hover {
      transform: translateY(-1px);
      border-color: rgba(194, 65, 12, 0.4);
    }

    .primary {
      background: var(--accent);
      color: white;
      border-color: transparent;
    }

    .primary:hover {
      background: var(--accent-dark);
      border-color: transparent;
    }

    .meta {
      margin-top: 18px;
      padding: 14px;
      border-radius: 16px;
      background: rgba(255, 255, 255, 0.7);
      color: var(--muted);
      font-size: 13px;
      line-height: 1.6;
      word-break: break-all;
    }

    .stage {
      min-height: 520px;
      border-radius: 24px;
      border: 1px dashed rgba(31, 41, 55, 0.18);
      background:
        linear-gradient(135deg, rgba(255, 255, 255, 0.72), rgba(255, 255, 255, 0.45)),
        repeating-linear-gradient(
          45deg,
          rgba(31, 41, 55, 0.03) 0,
          rgba(31, 41, 55, 0.03) 12px,
          transparent 12px,
          transparent 24px
        );
      position: relative;
      overflow: hidden;
      display: grid;
      place-items: center;
    }

    #demoCanvas {
      width: 100%;
      height: 100%;
      display: block;
    }

    .status {
      margin-top: 14px;
      font-size: 14px;
      color: var(--muted);
    }

    .status.error {
      color: #b91c1c;
    }

    @media (max-width: 820px) {
      .content {
        grid-template-columns: 1fr;
      }

      .sidebar {
        border-right: 0;
        border-bottom: 1px solid var(--border);
        padding-right: 28px;
      }

      .stage {
        min-height: 380px;
      }
    }
  </style>
</head>
<body>
  <div class="app">
    <div class="header">
      <h1 class="title">SVGA 动画预览页</h1>
      <p class="desc">默认读取当前目录下 `assets` 里的 `.svga` 资源，并在页面中直接播放。</p>
    </div>

    <div class="content">
      <aside class="sidebar">
        <label class="label" for="assetSelect">选择动画</label>
        <select id="assetSelect"></select>

        <div class="actions">
          <button class="primary" id="playBtn" type="button">播放 / 重播</button>
          <button id="pauseBtn" type="button">暂停</button>
          <button id="stopBtn" type="button">停止</button>
        </div>

        <div class="meta" id="metaBox">当前资源：-</div>
      </aside>

      <main class="stage-wrap">
        <div class="stage">
          <canvas id="demoCanvas"></canvas>
        </div>
        <div class="status" id="statusText">准备加载动画…</div>
      </main>
    </div>
  </div>

  <script
    src="https://cdn.jsdelivr.net/npm/svga.lite@1.6.1/svga.lite.min.js"
    onerror="document.getElementById('statusText').textContent='SVGA 播放器脚本加载失败，请检查网络或 CDN 地址。';document.getElementById('statusText').classList.add('error');"
  ></script>
  <script>
    let assets = [];

    const assetSelect = document.getElementById("assetSelect");
    const metaBox = document.getElementById("metaBox");
    const statusText = document.getElementById("statusText");
    const playBtn = document.getElementById("playBtn");
    const pauseBtn = document.getElementById("pauseBtn");
    const stopBtn = document.getElementById("stopBtn");

    if (!window.SVGA) {
      setStatus("SVGA 播放器未加载成功，请检查 CDN 脚本。", true);
      throw new Error("SVGA library failed to load.");
    }

    const downloader = new SVGA.Downloader();
    const parser = new SVGA.Parser();
    const player = new SVGA.Player("#demoCanvas");
    let currentLoadToken = 0;
    let hasMountedVideo = false;

    function setStatus(message, isError = false) {
      statusText.textContent = message;
      statusText.classList.toggle("error", isError);
    }

    function renderOptions() {
      assetSelect.innerHTML = "";

      assets.forEach((assetPath) => {
        const option = document.createElement("option");
        option.value = assetPath;
        option.textContent = assetPath.split("/").pop();
        assetSelect.appendChild(option);
      });
    }

    async function discoverAssets() {
      setStatus("扫描 assets 目录...");

      try {
        const response = await fetch("assets/");

        if (!response.ok) {
          throw new Error("Failed to fetch assets directory: HTTP " + response.status);
        }

        const html = await response.text();
        const documentNode = new DOMParser().parseFromString(html, "text/html");

        assets = Array.from(documentNode.querySelectorAll("a"))
          .map((anchor) => anchor.getAttribute("href") || "")
          .filter((href) => href && !href.endsWith("/") && /\.svga$/i.test(href))
          .map((href) => "assets/" + decodeURIComponent(href.replace(/^\.\//, "")))
          .sort((left, right) => left.localeCompare(right));

        if (!assets.length) {
          throw new Error("No .svga files found in assets directory.");
        }

        renderOptions();
        assetSelect.value = assets[0];
        await loadAnimation(assets[0]);
      } catch (error) {
        console.error(error);
        assetSelect.innerHTML = "";
        metaBox.textContent = "当前资源：未找到可播放的 .svga 文件";
        setStatus("未能自动读取 assets 目录。请通过本地静态服务器访问，并确认目录下存在 .svga 文件。", true);
      }
    }

    async function loadAnimation(assetPath) {
      const loadToken = ++currentLoadToken;
      setStatus("加载中...");
      metaBox.textContent = "当前资源：" + assetPath;

      try {
        if (hasMountedVideo) {
          player.stop();
          player.clear();
        }

        const fileData = await downloader.get(assetPath);
        const videoItem = await parser.do(fileData);

        if (loadToken !== currentLoadToken) {
          return;
        }

        await player.mount(videoItem);
        hasMountedVideo = true;
        player.start();
        setStatus("播放中");
      } catch (error) {
        if (loadToken !== currentLoadToken) {
          return;
        }
        console.error(error);
        setStatus("加载失败，请确认通过本地服务器访问页面，并检查资源路径是否正确。", true);
      }
    }

    assetSelect.addEventListener("change", (event) => {
      loadAnimation(event.target.value);
    });

    playBtn.addEventListener("click", () => {
      if (!assetSelect.value) {
        return;
      }
      loadAnimation(assetSelect.value);
    });

    pauseBtn.addEventListener("click", () => {
      if (!hasMountedVideo) {
        return;
      }
      player.pause();
      setStatus("已暂停");
    });

    stopBtn.addEventListener("click", () => {
      if (!hasMountedVideo) {
        return;
      }
      player.stop();
      setStatus("已停止");
    });

    discoverAssets();
  </script>
</body>
</html>
